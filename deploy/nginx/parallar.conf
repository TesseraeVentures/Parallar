# Parallar nginx vhosts. The marketing site and the dApp are CLEANLY SEPARATED: each subdomain has
# its own docroot, built from the flat frontend/ source by scripts/build_web.sh (which also rewires
# the shared nav's cross-links to absolute cross-subdomain URLs). app.parallar.com carries ONLY the
# dApp; www.parallar.com ONLY the marketing site. No backend — the dApp talks to Stellar testnet RPC
# + Freighter entirely client-side.
#
# Install:
#   bash scripts/build_web.sh                    # produces dist/www and dist/app
#   sudo cp deploy/nginx/parallar.conf /etc/nginx/sites-available/parallar.conf
#   sudo ln -s /etc/nginx/sites-available/parallar.conf /etc/nginx/sites-enabled/
#   # edit the two `root` paths below to <your-repo>/dist/www and <your-repo>/dist/app
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d parallar.com -d www.parallar.com -d app.parallar.com   # adds TLS (443)

# apex → www
server {
    listen 80;
    listen [::]:80;
    server_name parallar.com;
    return 301 https://www.parallar.com$request_uri;
}

# www.parallar.com — the marketing / overview site (dist/www: index + bondholders/underwriters/how-it-works/testnet)
server {
    listen 80;
    listen [::]:80;
    server_name www.parallar.com;

    root /srv/parallar/dist/www;   # ← set to <your-repo>/dist/www
    index index.html;

    location / { try_files $uri $uri/ =404; }

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}

# app.parallar.com — the dApp ONLY (dist/app: app.html served as index.html + dapp.js + commit.wasm)
server {
    listen 80;
    listen [::]:80;
    server_name app.parallar.com;

    root /srv/parallar/dist/app;   # ← set to <your-repo>/dist/app
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    # commit.wasm must be served as application/wasm (the in-browser Poseidon commitment)
    types { application/wasm wasm; }
    location ~* \.wasm$ { default_type application/wasm; add_header Cache-Control "public, max-age=86400"; }

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
