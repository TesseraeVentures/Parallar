name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly: run the slow image_id reproducibility guard

jobs:
  test:
    name: contracts (native) + guests + property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Contracts that test against the in-process host. The factory + yield_factory tests use
      # `contractimport!` and need built wasm, so they run in the `contracts-wasm` job below.
      - name: contracts — native suites
        run: cargo test --locked --workspace --exclude parallar-factory --exclude parallar-yield-factory
      # Determination guests + the relocated property-test crate (native). The RISC Zero ELF/host
      # tests need the risc0 toolchain and run on the x86 box. proptest lives in parallar-proptests,
      # NEVER in a guest crate (a guest dev-dep would shift its ELF/image_id).
      - name: guests + property tests (native)
        working-directory: prover
        run: cargo test --locked -p settle-credit-v1 -p settle-weather-v1 -p settle-credit-v2 -p claim-credit-v1 -p solvency-v1 -p parallar-proptests

  contracts-wasm:
    name: factory deploy tests (build wasm for contractimport!)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      # The factory + yield_factory tests `contractimport!` the deployed family wasm — build it
      # first (cargo handles the Soroban wasm target directly; no stellar-cli needed in CI).
      - name: build contract wasm
        run: cargo build --locked --release --target wasm32v1-none
      - name: factory + yield_factory deploy tests
        run: cargo test --locked -p parallar-factory -p parallar-yield-factory

  hygiene:
    name: invariants of the build itself
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ARCHITECTURAL LAW #1: the settlement contract must have NO mock-verify path — a verified
      # proof is the sole payout authorization. A reintroduced stub must fail the build.
      - name: settlement has no mock-verify path
        run: |
          if grep -rniE 'mock[-_]?verify' contracts/settlement/; then
            echo "::error::mock-verify must not exist in the settlement contract"; exit 1
          fi
          echo "ok: real verification only"
      # House style: no em/en dashes in the judge-facing frontend.
      - name: frontend has no em/en dashes
        run: |
          if grep -rlP '[\x{2014}\x{2013}]' frontend/*.html frontend/*.css frontend/*.js; then
            echo "::error::em/en dash found in frontend"; exit 1
          fi
          echo "ok: no em/en dashes"
      # The fresh-clone Definition-of-Done artifacts must exist.
      - name: required artifacts present
        run: |
          for f in demo.sh reset.sh README.md deployments/testnet.json frontend/commit.wasm VERIFY.md SECURITY.md docs/OPERATIONS.md docs/ECONOMICS.md scripts/verify.sh scripts/check_image_ids.sh scripts/ttl_monitor.sh; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done
          echo "ok: artifacts present"

  image-ids:
    name: guest image_id reproducibility + on-chain verify (thorough; manual/weekly)
    runs-on: ubuntu-latest
    # The RISC Zero toolchain + ELF build is slow, so this guards reproducibility on a schedule /
    # on demand rather than on every push. Asserts each guest image_id still matches its pinned
    # value — credit_v1 must equal the deployed type's id (the versioning law) — and runs the
    # keystone on-chain-verify test (the real Groth16 verifier pays only on a valid proof, the
    # load-bearing Law #1 evidence) so an image_id↔fixture drift is caught here, not only in demo.sh.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install RISC Zero toolchain
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install
      - name: assert pinned image_ids
        run: ./scripts/check_image_ids.sh
      - name: on-chain verify (real Groth16 verifier, committed fixture)
        working-directory: prover
        run: cargo test -p parallar-prover-host --test onchain_verify
