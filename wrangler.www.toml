# Cloudflare Workers Static Assets — SINGLE SURFACE. Serves the whole site + dApp from frontend/
# on one domain (parallar.com / www.parallar.com); the dApp is parallar.com/app.html, reached by
# the existing relative "Try it" nav. No build step needed (frontend/ is committed with working
# relative links), so the Worker's Build command can be left blank.
#   Deploy command: npx wrangler deploy -c wrangler.www.toml
# (The two-domain split — dist/www + dist/app via scripts/build_web.sh — remains available if ever
#  wanted; it's a deploy choice, not a code change.)
name = "parallar-www"
compatibility_date = "2025-09-01"

[assets]
directory = "./frontend"
